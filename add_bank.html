<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bank Account Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --success:#16a34a;
  --danger:#dc2626;
  --dark:#0f172a;
  --bg:#f1f5f9;
  --card:#ffffff;
  --muted:#64748b;
}

*{box-sizing:border-box}

body{
  font-family:Poppins,sans-serif;
  background:linear-gradient(135deg,#e0e7ff,#f8fafc);
  margin:0;
  padding:24px;
}

h1{
  text-align:center;
  margin-bottom:6px;
}

.subtitle{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  margin-bottom:26px;
}

.container{
  margin:auto;
  background:var(--card);
  padding:28px;
  border-radius:18px;
  box-shadow:0 25px 50px rgba(0,0,0,.1);
}

.section-title{
  font-size:17px;
  font-weight:700;
  margin:16px 0;
  display:flex;
  align-items:center;
  gap:8px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
}

input,select{
  padding:12px;
  border-radius:12px;
  border:1px solid #cbd5f5;
  font-size:14px;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,.2);
}

input[readonly]{
  background:#f8fafc;
}

.actions{
  display:flex;
  gap:12px;
  margin-top:18px;
  flex-wrap:wrap;
}

button{
  border:none;
  padding:12px 22px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
}

.primary{background:var(--primary);color:#fff}
.secondary{background:var(--dark);color:#fff}
.danger{background:var(--danger);color:#fff}

.status{
  margin-top:12px;
  font-size:13px;
}
.status.success{color:var(--success)}
.status.error{color:var(--danger)}


.badge{
  background:#e0e7ff;
  color:#1e40af;
  padding:4px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

.empty{
  text-align:center;
  padding:20px;
  color:var(--muted);
}

@media(max-width:600px){
  table,thead,tbody,tr,th,td{display:block}
  thead{display:none}
  tr{
    margin-bottom:14px;
    background:#fff;
    padding:16px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
  }
  td{border:none}
}

.card-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  margin-top:20px;
}

.bank-card{
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  padding:24px;
  border-radius:24px;
  position:relative;
  overflow:hidden;
  transition:all .35s ease;
  box-shadow:
    0 10px 30px rgba(0,0,0,.08),
    inset 0 1px 0 rgba(255,255,255,.6);
  border:1px solid rgba(255,255,255,0.4);
}

/* Soft gradient border glow */
.bank-card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:24px;
  padding:1px;
  background:linear-gradient(
    135deg,
    rgba(37,99,235,.4),
    rgba(124,58,237,.4),
    rgba(16,185,129,.4)
  );
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}

/* Light reflection effect */
.bank-card::after{
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,.4) 50%,
    transparent 60%
  );
  transform:rotate(25deg);
  transition:all .6s ease;
  opacity:0;
}

/* Hover Animation */
.bank-card:hover{
  transform:translateY(-10px) scale(1.02);
  box-shadow:
    0 25px 50px rgba(0,0,0,.15),
    0 10px 20px rgba(37,99,235,.2);
}

.bank-card:hover::after{
  opacity:1;
  animation:shine 1.2s ease forwards;
}

@keyframes shine{
  from{
    transform:translateX(-100%) rotate(25deg);
  }
  to{
    transform:translateX(100%) rotate(25deg);
  }
}


.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.customer-id{
  font-size:13px;
  font-weight:600;
  color:#64748b;
}

.account-type{
  background:#e0e7ff;
  color:#1e40af;
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

.account-number{
  font-size:22px;
  font-weight:700;
  letter-spacing:3px;
  color:#111827;
}


.holder-name{
  font-weight:600;
  margin-bottom:10px;
}

.bank-name{
  font-size:14px;
  color:#334155;
}

.branch{
  font-size:13px;
  color:#64748b;
  margin-bottom:12px;
}

.ifsc-badge{
  display:inline-block;
  background:#2563eb;
  color:#fff;
  padding:6px 14px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

.card-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:22px;
  padding-top:14px;
  border-top:1px solid rgba(0,0,0,0.06);
}

/* Base Style */
.card-actions span{
  display:flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:38px;
  border-radius:12px;
  font-size:15px;
  cursor:pointer;
  transition:all .25s ease;
  background:#ffffff;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  border:2px solid transparent;
}

/* ========================= */
/* SHARE - Green */
/* ========================= */

.card-actions span:nth-child(1){
  color:#16a34a;
  border-color:#16a34a;
}

.card-actions span:nth-child(1):hover{
  background:#16a34a;
  color:#fff;
  transform:translateY(-3px);
  box-shadow:0 10px 18px rgba(22,163,74,.35);
}

/* ========================= */
/* VIEW - Blue */
/* ========================= */

.card-actions span:nth-child(2){
  color:#2563eb;
  border-color:#2563eb;
}

.card-actions span:nth-child(2):hover{
  background:#2563eb;
  color:#fff;
  transform:translateY(-3px);
  box-shadow:0 10px 18px rgba(37,99,235,.35);
}

/* ========================= */
/* EDIT - Orange */
/* ========================= */

.card-actions span:nth-child(3){
  color:#f97316;
  border-color:#f97316;
}

.card-actions span:nth-child(3):hover{
  background:#f97316;
  color:#fff;
  transform:translateY(-3px);
  box-shadow:0 10px 18px rgba(249,115,22,.35);
}

/* Click press effect */
.card-actions span:active{
  transform:scale(0.95);
}

/* QR - Purple */
.card-actions span:nth-child(4){
  color:#7c3aed;
  border-color:#7c3aed;
}

.card-actions span:nth-child(4):hover{
  background:#7c3aed;
  color:#fff;
  transform:translateY(-3px);
  box-shadow:0 10px 18px rgba(124,58,237,.35);
}

/* DELETE - Red */
.card-actions span:nth-child(5){
  color:#dc2626;
  border-color:#dc2626;
}

.card-actions span:nth-child(5):hover{
  background:#dc2626;
  color:#fff;
  transform:translateY(-3px);
  box-shadow:0 10px 18px rgba(220,38,38,.35);
}

/* COPY - Teal */
.card-actions span:nth-child(6){
  color:#0ea5e9;
  border-color:#0ea5e9;
}

.card-actions span:nth-child(6):hover{
  background:#0ea5e9;
  color:#fff;
  transform:translateY(-3px);
  box-shadow:0 10px 18px rgba(14,165,233,.35);
}

.add-bank-wrapper{
  overflow:hidden;
  max-height:0;
  opacity:0;
  transform:translateY(-10px);
  transition:all .4s ease;
}

.add-bank-wrapper.active{
  max-height:1200px;
  opacity:1;
  transform:translateY(0);
  margin-top:20px;
}

.search-wrapper{
  width:100%;
  max-width:320px;
}

.search-box{
  display:flex;
  align-items:center;
  background:#ffffff;
  padding:10px 14px;
  border-radius:999px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
  border:1px solid #e2e8f0;
  width:100%;
}

.search-box input{
  border:none;
  outline:none;
  flex:1;
  font-size:14px;
  background:transparent;
  padding:6px;
}

.search-icon{
  color:#64748b;
  margin-right:8px;
}

.clear-btn{
  cursor:pointer;
  font-size:14px;
  color:#94a3b8;
  display:none;
}

@media(max-width:600px){

  .section-title{
    flex-direction:column;
    align-items:flex-start;
    gap:14px;
  }

  .search-wrapper{
    width:100%;
    max-width:100%;
  }

  #toggleFormBtn{
    width:100%;
  }

}

</style>
</head>

<body>

<h1>🏦 Bank Account Manager</h1>
<div class="subtitle">Secure & Simple Bank Account Maintenance</div>

<div class="container">

  <!-- Header with Toggle Button -->
  <div class="section-title" style="display:flex; align-items:center; justify-content:space-between;">
    <span>🏦 Bank Accounts</span>
    <button id="toggleFormBtn" class="primary">+ Add Bank</button>
  </div>

  <!-- Hidden Add Bank Form -->
  <div id="addBankSection" class="add-bank-wrapper">

    <div class="section-title">➕ Add Bank Account</div>

    <div class="grid">
      <div class="form-group">
        <label>IFSC Code</label>
        <input id="ifsc" placeholder="SBIN0000001" onblur="fetchIFSC()">
      </div>

      <div class="form-group">
        <label>Bank Name</label>
        <input id="bank" readonly>
      </div>

      <div class="form-group">
        <label>Branch Name</label>
        <input id="branch" readonly>
      </div>

      <div class="form-group">
  <label>Branch Full Details</label>
  <input id="branchDetails" readonly>
</div>


      <div class="form-group">
        <label>Account Holder Name</label>
        <input id="holder">
      </div>

      <div class="form-group">
        <label>Customer ID</label>
        <input id="customerId" placeholder="e.g. CUST1001">
      </div>

      <div class="form-group">
        <label>Account Number</label>
        <input id="account">
      </div>

      <div class="form-group">
        <label>Account Type</label>
        <select id="type">
          <option>Savings</option>
          <option>Current</option>
        </select>
      </div>
    </div>

    <div class="actions">
      <button class="primary" onclick="addBank()">Save Bank</button>
      <button class="secondary" onclick="clearForm()">Clear</button>
    </div>

    <div id="status" class="status"></div>

  </div>

  <!-- Saved Banks Section -->
 <!-- Saved Banks Header + Search -->
<div class="section-title" style="margin-top:28px; justify-content:space-between;">
  <span>📋 Saved Bank Accounts</span>

  <div class="search-wrapper">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"
           fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>

      <input type="text" id="searchInput"
             placeholder="Search by Customer ID, Bank, Holder...">

      <span id="clearSearch" class="clear-btn">✖</span>
    </div>
  </div>
</div>

<!-- Cards Container OUTSIDE -->
<div id="bankCards" class="card-container"></div>




<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  getDocs, 
  doc, 
  getDoc, 
  updateDoc,
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyCE2_x5xvW3wCsOx6jo9-ZhNOhgWm86cPY",
  authDomain: "mrsamrat08.firebaseapp.com",
  projectId: "mrsamrat08"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let editingId = null;


const statusBox = document.getElementById("status");

window.fetchIFSC = async () => {

  if(!ifsc.value) return;

  statusBox.textContent = "Checking IFSC...";
  statusBox.className = "status";

  try{
    const res = await fetch(`https://ifsc.razorpay.com/${ifsc.value.trim().toUpperCase()}`);
    if(!res.ok) throw "";

    const d = await res.json();

    bank.value = d.BANK || "";
    branch.value = d.BRANCH || "";

    // ALL details in ONE field
    branchDetails.value = d.ADDRESS || "";


    statusBox.textContent = "IFSC verified ✔";
    statusBox.className = "status success";

  }catch{

    bank.value = "";
    branch.value = "";
    branchDetails.value = "";

    statusBox.textContent = "Invalid IFSC";
    statusBox.className = "status error";
  }
};

window.addBank = async () => {

  if(!ifsc.value || !holder.value || !account.value || !customerId.value){
    statusBox.textContent = "Fill all required fields";
    statusBox.className = "status error";
    return;
  }

  const data = {
    customerId: customerId.value.trim(),
    ifsc: ifsc.value.trim(),
    bank: bank.value,
    branch: branch.value,
    branchDetails: branchDetails.value,
    holder: holder.value.trim(),
    account: account.value.trim(),
    type: type.value,
    updatedAt: new Date()
  };

  try {

    if(editingId){
      // 🔄 UPDATE MODE
      await updateDoc(doc(db,"bankAccounts",editingId), data);

      statusBox.textContent = "Bank account updated successfully";
      editingId = null;

      document.querySelector(".primary").textContent = "Save Bank";

    } else {
      // ➕ CREATE MODE
      data.createdAt = new Date();
      await addDoc(collection(db,"bankAccounts"), data);

      statusBox.textContent = "Bank account saved successfully";
    }

    statusBox.className = "status success";

    clearForm();
    loadBanks();

  } catch(error){
    statusBox.textContent = "Something went wrong";
    statusBox.className = "status error";
    console.error(error);
  }
};


window.clearForm = () => {

  ["ifsc","bank","branch","branchDetails","holder","account","customerId"]
  .forEach(i=>document.getElementById(i).value="");

  editingId = null;
  document.querySelector(".primary").textContent = "Save Bank";
};

ifsc.addEventListener("input", ()=>{
  ifsc.value = ifsc.value.toUpperCase();
});



async function loadBanks(){
  const snap = await getDocs(collection(db,"bankAccounts"));
  const container = document.getElementById("bankCards");
  container.innerHTML="";

  if(snap.empty){
    container.innerHTML = `
      <div class="empty">
        No bank accounts added yet
      </div>`;
    return;
  }

  snap.forEach(doc=>{
    const b = doc.data();

container.innerHTML += `
<div class="bank-card">
  
  <div class="card-header">
    <div class="customer-id">Customer ID: ${b.customerId || '-'}</div>
    <div class="account-type">${b.type}</div>
  </div>

  <!-- Bank Info Section -->
  <div class="bank-name">
    <strong>Bank:</strong> ${b.bank}
  </div>

  <div class="branch">
    <strong>Branch:</strong> ${b.branch}
  </div>

  <div class="branch">
    <strong>Address:</strong> ${b.branchDetails || "-"}
  </div>

  <!-- Account Info Section -->
  <div class="holder-name">
    <strong>Account Holder:</strong> ${b.holder}
  </div>

  <div class="account-number" id="acc-${doc.id}">
    •••• ${b.account.slice(-4)}
  </div>

  <div class="ifsc-badge">
    IFSC: ${b.ifsc}
  </div>


   <div class="card-actions">
  
  <span onclick="shareSingle('${doc.id}')">
    <!-- Share Icon -->
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" y1="2" x2="12" y2="15"/>
    </svg>
  </span>

<span onclick="viewAccount('${doc.id}', this)">
  <svg id="eye-${doc.id}" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>
</span>



  <span onclick="editAccount('${doc.id}')">
    <!-- Edit Icon -->
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 20h9"/>
      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
    </svg>
  </span>

  <span onclick="generateQR('${doc.id}')">
  <!-- QR Icon -->
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="3" width="5" height="5"/>
    <rect x="16" y="3" width="5" height="5"/>
    <rect x="3" y="16" width="5" height="5"/>
    <path d="M16 16h5v5h-5z"/>
  </svg>
</span>

<span onclick="deleteAccount('${doc.id}')">
  <!-- Delete Icon -->
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="3 6 5 6 21 6"/>
    <path d="M19 6l-2 14H7L5 6"/>
    <path d="M10 11v6"/>
    <path d="M14 11v6"/>
    <path d="M9 6V4h6v2"/>
  </svg>
</span>

<span onclick="copyAccount('${doc.id}', this)">
  <svg id="copy-${doc.id}" viewBox="0 0 24 24" width="18" height="18"
       fill="none" stroke="currentColor" stroke-width="2"
       stroke-linecap="round" stroke-linejoin="round">
    <rect x="9" y="9" width="13" height="13" rx="2"/>
    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
  </svg>
</span>



</div>


  </div>
`;

  });
}


window.shareSingle = async (id) => {

  const ref = doc(db,"bankAccounts",id);
  const snap = await getDoc(ref);

  if(!snap.exists()) return;

  const b = snap.data();

let text = 
`BANK ACCOUNT INFORMATION

Customer ID: ${b.customerId || '-'}
Account Holder: ${b.holder}

Bank: ${b.bank}
Branch: ${b.branch}

Account Number: ${b.account}
IFSC: ${b.ifsc}
Account Type: ${b.type}

This information is confidential and intended for authorized use only.
Generated by Bank Account Manager System.`;
;


  if(navigator.share){
    try{
      await navigator.share({
        title:"Bank Account",
        text:text
      });
    }catch{}
  } else {
    await navigator.clipboard.writeText(text);
    alert("Copied to clipboard");
  }
};

window.viewAccount = async (id, el)=>{

  const snap = await getDoc(doc(db,"bankAccounts",id));
  if(!snap.exists()) return;

  const b = snap.data();
  const accElement = document.getElementById(`acc-${id}`);
  const eyeIcon = document.getElementById(`eye-${id}`);

  if(accElement.dataset.visible === "true"){
    hideAccount(id, b.account);
    return;
  }

  // Show full account
  accElement.innerHTML = b.account;
  accElement.dataset.visible = "true";

  // Change icon to eye-off
 eyeIcon.innerHTML = `
  <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C5 20 1 12 1 12a21.77 21.77 0 0 1 5.06-7.94"/>
  <path d="M9.9 4.24A9.77 9.77 0 0 1 12 4c7 0 11 8 11 8a21.94 21.94 0 0 1-2.06 3.19"/>
  <line x1="1" y1="1" x2="23" y2="23"/>
`;


  // Auto hide after 5 seconds
  setTimeout(()=>{
    hideAccount(id, b.account);
  }, 5000);
};

function hideAccount(id, fullAccount){
  const accElement = document.getElementById(`acc-${id}`);
  const eyeIcon = document.getElementById(`eye-${id}`);

  accElement.innerHTML = `•••• ${fullAccount.slice(-4)}`;
  accElement.dataset.visible = "false";

  // Restore normal eye icon
  eyeIcon.innerHTML = `
    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
    <circle cx="12" cy="12" r="3"/>
  `;
}



window.editAccount = async (id)=>{

  const snap = await getDoc(doc(db,"bankAccounts",id));
  if(!snap.exists()) return;

  const b = snap.data();

  // Fill form with existing values
  ifsc.value = b.ifsc || "";
  bank.value = b.bank || "";
  branch.value = b.branch || "";
  branchDetails.value = b.branchDetails || "";
  holder.value = b.holder || "";
  customerId.value = b.customerId || "";
  account.value = b.account || "";
  type.value = b.type || "Savings";

  editingId = id;

  // Open form automatically
  addSection.classList.add("active");
  toggleBtn.textContent = "✖ Close";

  // Change button text
  document.querySelector(".primary").textContent = "Update Bank";
};


window.generateQR = (id)=>{
  alert("QR feature coming later...");
};


window.copyAccount = async (id, el)=>{

  const snap = await getDoc(doc(db,"bankAccounts",id));
  if(!snap.exists()) return;

  const b = snap.data();
  const copyIcon = document.getElementById(`copy-${id}`);

  // Same professional format as share
  let text = 
`BANK ACCOUNT INFORMATION

Customer ID: ${b.customerId || '-'}
Account Holder: ${b.holder}

Bank: ${b.bank}
Branch: ${b.branch}

Account Number: ${b.account}
IFSC: ${b.ifsc}
Account Type: ${b.type}

const toggleBtn = document.getElementById("toggleFormBtn");
const addSection = document.getElementById("addBankSection");

toggleBtn.addEventListener("click", () => {
  addSection.classList.toggle("active");

  if(addSection.classList.contains("active")){
    toggleBtn.textContent = "✖ Close";
  } else {
    toggleBtn.textContent = "+ Add Bank";
  }
});

const searchInput = document.getElementById("searchInput");

searchInput.addEventListener("input", ()=>{
  const searchValue = searchInput.value.toLowerCase();

  const cards = document.querySelectorAll(".bank-card");

  cards.forEach(card=>{
    const text = card.innerText.toLowerCase();

    if(text.includes(searchValue)){
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
});
