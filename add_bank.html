<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bank Account Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2563eb;
  --success:#16a34a;
  --danger:#dc2626;
  --dark:#0f172a;
  --bg:#f1f5f9;
  --card:#ffffff;
  --muted:#64748b;
}

*{box-sizing:border-box}

body{
  font-family:Poppins,sans-serif;
  background:linear-gradient(135deg,#e0e7ff,#f8fafc);
  margin:0;
  padding:24px;
}

h1{
  text-align:center;
  margin-bottom:6px;
}

.subtitle{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  margin-bottom:26px;
}

.container{
  max-width:1000px;
  margin:auto;
  background:var(--card);
  padding:28px;
  border-radius:18px;
  box-shadow:0 25px 50px rgba(0,0,0,.1);
}

.section-title{
  font-size:17px;
  font-weight:700;
  margin:16px 0;
  display:flex;
  align-items:center;
  gap:8px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

label{
  font-size:13px;
  font-weight:600;
  margin-bottom:6px;
}

input,select{
  padding:12px;
  border-radius:12px;
  border:1px solid #cbd5f5;
  font-size:14px;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,.2);
}

input[readonly]{
  background:#f8fafc;
}

.actions{
  display:flex;
  gap:12px;
  margin-top:18px;
  flex-wrap:wrap;
}

button{
  border:none;
  padding:12px 22px;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
}

.primary{background:var(--primary);color:#fff}
.secondary{background:var(--dark);color:#fff}
.danger{background:var(--danger);color:#fff}

.status{
  margin-top:12px;
  font-size:13px;
}
.status.success{color:var(--success)}
.status.error{color:var(--danger)}


.badge{
  background:#e0e7ff;
  color:#1e40af;
  padding:4px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

.empty{
  text-align:center;
  padding:20px;
  color:var(--muted);
}

@media(max-width:600px){
  table,thead,tbody,tr,th,td{display:block}
  thead{display:none}
  tr{
    margin-bottom:14px;
    background:#fff;
    padding:16px;
    border-radius:14px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
  }
  td{border:none}
}

.card-container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  margin-top:20px;
}

.bank-card{
  background:linear-gradient(145deg,#ffffff,#f1f5f9);
  padding:22px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
  transition:all .3s ease;
  position:relative;
  overflow:hidden;
}

.bank-card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 40px rgba(0,0,0,.12);
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.customer-id{
  font-size:13px;
  font-weight:600;
  color:#64748b;
}

.account-type{
  background:#e0e7ff;
  color:#1e40af;
  padding:5px 12px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

.account-number{
  font-size:20px;
  font-weight:700;
  margin:8px 0;
  letter-spacing:1px;
}

.holder-name{
  font-weight:600;
  margin-bottom:10px;
}

.bank-name{
  font-size:14px;
  color:#334155;
}

.branch{
  font-size:13px;
  color:#64748b;
  margin-bottom:12px;
}

.ifsc-badge{
  display:inline-block;
  background:#2563eb;
  color:#fff;
  padding:6px 14px;
  border-radius:999px;
  font-size:11px;
  font-weight:600;
}

.card-actions{
  display:flex;
  justify-content:flex-end;
  gap:10px;
  margin-top:22px;
  padding-top:14px;
  border-top:1px solid rgba(0,0,0,0.06);
}

/* Base Style */
.card-actions span{
  display:flex;
  align-items:center;
  justify-content:center;
  width:38px;
  height:38px;
  border-radius:12px;
  font-size:15px;
  cursor:pointer;
  transition:all .25s ease;
  background:#ffffff;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
  border:2px solid transparent;
}

/* ========================= */
/* SHARE - Green */
/* ========================= */

.card-actions span:nth-child(1){
  color:#16a34a;
  border-color:#16a34a;
}

.card-actions span:nth-child(1):hover{
  background:#16a34a;
  color:#fff;
  transform:translateY(-3px);
  box-shadow:0 10px 18px rgba(22,163,74,.35);
}

/* ========================= */
/* VIEW - Blue */
/* ========================= */

.card-actions span:nth-child(2){
  color:#2563eb;
  border-color:#2563eb;
}

.card-actions span:nth-child(2):hover{
  background:#2563eb;
  color:#fff;
  transform:translateY(-3px);
  box-shadow:0 10px 18px rgba(37,99,235,.35);
}

/* ========================= */
/* EDIT - Orange */
/* ========================= */

.card-actions span:nth-child(3){
  color:#f97316;
  border-color:#f97316;
}

.card-actions span:nth-child(3):hover{
  background:#f97316;
  color:#fff;
  transform:translateY(-3px);
  box-shadow:0 10px 18px rgba(249,115,22,.35);
}

/* Click press effect */
.card-actions span:active{
  transform:scale(0.95);
}

/* QR - Purple */
.card-actions span:nth-child(4){
  color:#7c3aed;
  border-color:#7c3aed;
}

.card-actions span:nth-child(4):hover{
  background:#7c3aed;
  color:#fff;
  transform:translateY(-3px);
  box-shadow:0 10px 18px rgba(124,58,237,.35);
}


</style>
</head>

<body>

<h1>🏦 Bank Account Manager</h1>
<div class="subtitle">Secure & Simple Bank Account Maintenance</div>

<div class="container">

  <div class="section-title">➕ Add Bank Account</div>

  <div class="grid">
    <div class="form-group">
      <label>IFSC Code</label>
      <input id="ifsc" placeholder="SBIN0000001" onblur="fetchIFSC()">
    </div>

    <div class="form-group">
      <label>Bank Name</label>
      <input id="bank" readonly>
    </div>

    <div class="form-group">
      <label>Branch Name</label>
      <input id="branch" readonly>
    </div>

    <div class="form-group">
      <label>Account Holder Name</label>
      <input id="holder">
    </div>

    <div class="form-group">
  <label>Customer ID</label>
  <input id="customerId" placeholder="e.g. CUST1001">
</div>


    <div class="form-group">
      <label>Account Number</label>
      <input id="account">
    </div>

    <div class="form-group">
      <label>Account Type</label>
      <select id="type">
        <option>Savings</option>
        <option>Current</option>
      </select>
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="addBank()">Save Bank</button>
    <button class="secondary" onclick="clearForm()">Clear</button>
  </div>

  <div id="status" class="status"></div>
  <div class="section-title" style="margin-top:28px">📋 Saved Bank Accounts</div>

  <div id="bankCards" class="card-container"></div>
</div>


<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCE2_x5xvW3wCsOx6jo9-ZhNOhgWm86cPY",
  authDomain: "mrsamrat08.firebaseapp.com",
  projectId: "mrsamrat08"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const statusBox = document.getElementById("status");

window.fetchIFSC = async () => {
  if(!ifsc.value) return;
  statusBox.textContent="Checking IFSC...";
  try{
    const res = await fetch(`https://ifsc.razorpay.com/${ifsc.value}`);
    if(!res.ok) throw "";
    const d = await res.json();
    bank.value=d.BANK;
    branch.value=d.BRANCH;
    statusBox.textContent="IFSC verified ✔";
    statusBox.className="status success";
  }catch{
    bank.value=branch.value="";
    statusBox.textContent="Invalid IFSC";
    statusBox.className="status error";
  }
};

window.addBank = async () => {
  if(!ifsc.value || !holder.value || !account.value || !customerId.value){

    statusBox.textContent="Fill all required fields";
    statusBox.className="status error";
    return;
  }

  await addDoc(collection(db,"bankAccounts"),{
    customerId: customerId.value.trim(),
    ifsc:ifsc.value,
    bank:bank.value,
    branch:branch.value,
    holder:holder.value,
    account:account.value,
    type:type.value,
    createdAt:new Date()
  });

  statusBox.textContent="Bank account saved successfully";
  statusBox.className="status success";
  clearForm();
  loadBanks();
};

window.clearForm=()=>{
  ["ifsc","bank","branch","holder","account","customerId"]
  .forEach(i=>document.getElementById(i).value="");
};


async function loadBanks(){
  const snap = await getDocs(collection(db,"bankAccounts"));
  const container = document.getElementById("bankCards");
  container.innerHTML="";

  if(snap.empty){
    container.innerHTML = `
      <div class="empty">
        No bank accounts added yet
      </div>`;
    return;
  }

  snap.forEach(doc=>{
    const b = doc.data();

container.innerHTML += `
  <div class="bank-card">
    
    <div class="card-header">
      <div class="customer-id">Customer ID: ${b.customerId || '-'}</div>
      <div class="account-type">${b.type}</div>
    </div>

    <div class="account-number">•••• ${b.account.slice(-4)}</div>

    <div class="holder-name">${b.holder}</div>

    <div class="bank-name">${b.bank}</div>
    <div class="branch">${b.branch}</div>

    <div class="ifsc-badge">${b.ifsc}</div>

   <div class="card-actions">
  
  <span onclick="shareSingle('${doc.id}')">
    <!-- Share Icon -->
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/>
      <polyline points="16 6 12 2 8 6"/>
      <line x1="12" y1="2" x2="12" y2="15"/>
    </svg>
  </span>

  <span onclick="viewAccount('${doc.id}')">
    <!-- View Icon -->
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </span>

  <span onclick="editAccount('${doc.id}')">
    <!-- Edit Icon -->
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 20h9"/>
      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
    </svg>
  </span>

  <span onclick="generateQR('${doc.id}')">
  <!-- QR Icon -->
  <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="3" width="5" height="5"/>
    <rect x="16" y="3" width="5" height="5"/>
    <rect x="3" y="16" width="5" height="5"/>
    <path d="M16 16h5v5h-5z"/>
  </svg>
</span>


</div>


  </div>
`;

  });
}

import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.shareSingle = async (id) => {

  const ref = doc(db,"bankAccounts",id);
  const snap = await getDoc(ref);

  if(!snap.exists()) return;

  const b = snap.data();

  let text = 
`🏦 Bank Account Details

Customer ID: ${b.customerId || '-'}
Account Holder: ${b.holder}
Bank: ${b.bank}
Branch: ${b.branch}
Account Number: XXXX${b.account.slice(-4)}
IFSC: ${b.ifsc}
Type: ${b.type}`;

  if(navigator.share){
    try{
      await navigator.share({
        title:"Bank Account",
        text:text
      });
    }catch{}
  } else {
    await navigator.clipboard.writeText(text);
    alert("Copied to clipboard");
  }
};

window.viewAccount = (id)=>{
  alert("View feature coming next...");
};

window.editAccount = (id)=>{
  alert("Edit feature coming next...");
};

window.generateQR = (id)=>{
  alert("QR feature coming later...");
};

loadBanks();
</script>

</body>
</html>
